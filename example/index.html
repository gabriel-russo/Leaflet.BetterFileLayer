<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leaflet.BetterFileLayer</title>

  <!-- Code -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="common.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.css"
        crossorigin="anonymous" referrerpolicy="no-referrer"/>

  <!-- Leaflet Better FileLayer -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-better-filelayer@2.0.0/dist/leaflet.betterfilelayer.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
<header class="header">
  <h1 class="header__title">
    <div class="folder-pois-icon icon--medium"></div>
    Leaflet Better FileLayer
  </h1>
  <nav class="nav">
    <a class="nav__link" href="https://github.com/gabriel-russo/Leaflet.BetterFileLayer/wiki">[Wiki]</a>
    <a class="nav__link" href="https://npmjs.com/package/leaflet-better-filelayer">[NPM]</a>
    <a class="nav__link nav__link--mobile" href="https://github.com/gabriel-russo/Leaflet.BetterFileLayer">
      <div class="github-icon icon--small"></div>
    </a>
  </nav>
</header>
<main class="container">
  <div class="events">
    <p class="events__title">Event Log</p>
    <p class="events__type">Event Type: <span id="type"></span></p>
    <div class="events__output">
      <pre><code id="output"></code></pre>
    </div>
  </div>
  <div id="map" class="map"></div>
</main>
<footer class="footer">
  <p class="footer__text">
    Created by <a class="footer__text--link" href="https://github.com/gabriel-russo">Gabriel Russo</a>
  </p>
</footer>
</body>
<script type="importmap">
  {
      "imports": {
          "leaflet": "https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.js",
          "leaflet-better-filelayer": "https://unpkg.com/leaflet-better-filelayer@2.0.0/dist/leaflet.betterfilelayer.js"
      }
  }
</script>
<script type="module">
  import {Map, TileLayer} from 'leaflet';
  import {BetterFileLayer} from "leaflet-better-filelayer";

  const tiles = new TileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19,
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
  });

  const bfl = new BetterFileLayer({position: "topleft"});

  const map = new Map('map').setView([-8.748008188078693, -63.88549804687501], 13);

  map.addLayer(tiles)

  map.addControl(bfl);

  const event_type = document.getElementById("type");

  const event_output = document.getElementById("output");

  map.on("bfl:layerloaded", (e) => {
    // Removing unwanted properties
    const {layer, target, sourceTarget, ...data} = e;

    event_type.innerText = data.type;

    event_output.innerText += JSON.stringify(data, undefined, 2) + "\n\n";

    map.fitBounds(layer.getBounds());
  });

  map.on("bfl:layerloaderror", (e) => {
    // Removing unwanted properties
    const {layer, target, sourceTarget, ...data} = e;

    event_type.innerText = data.type;

    event_output.innerText = JSON.stringify(data, undefined, 2);
  });

  map.on("bfl:filenotsupported", (e) => {
    // Removing unwanted properties
    const {layer, target, sourceTarget, ...data} = e;

    event_type.innerText = data.type;

    event_output.innerText = JSON.stringify(data, undefined, 2);
  });

  map.on("bfl:layerisempty", (e) => {
    // Removing unwanted properties
    const {layer, target, sourceTarget, ...data} = e;

    event_type.innerText = data.type;

    event_output.innerText = JSON.stringify(data, undefined, 2);
  });

  map.on("bfl:filesizelimit", (e) => {
    // Removing unwanted properties
    const {layer, target, sourceTarget, ...data} = e;

    event_type.innerText = data.type;

    event_output.innerText = JSON.stringify(data, undefined, 2);
  });

</script>
</html>
