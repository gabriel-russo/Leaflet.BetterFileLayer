<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dev - Leaflet Better File Layer</title>

    <!-- Dependency to Leaflet -->
    <link rel="stylesheet" href="node_modules/leaflet/dist/leaflet.css"/>

    <!-- Files from current project -->
    <link rel="stylesheet" href="./dist/leaflet.betterfilelayer.css">
</head>
<body>
<div id="map" style="width: 98vw; height: 85vh"></div>
</body>
<script type="importmap">
    {
        "imports": {
            "leaflet": "https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.js",
            "leaflet-better-filelayer": "./dist/leaflet.betterfilelayer.js"
        }
    }
</script>
<script type="module">
  import { Map, TileLayer } from 'leaflet';
  import { BetterFileLayer } from "leaflet-better-filelayer";

  const tiles = new TileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  });

  const bfl = new BetterFileLayer({ position: "topleft" });

  console.log(bfl);

  const map = new Map('map')
    .setView([-8.748008188078693, -63.88549804687501], 13)
    .addLayer(tiles)
    .addControl(bfl);

  map.on("bfl:layerloaded", (ev) => {
    console.log(ev);
    map.fitBounds(ev.layer.getBounds());
  });

  map.on("bfl:layerloaderror", (ev) => {
    console.log(ev);
  });

</script>
</html>
